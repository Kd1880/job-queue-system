[pytest]
; pytest.ini
; ------------------
; PURPOSE: Registers custom pytest markers and sets async test defaults so
;          `pytest` runs cleanly with no warnings out of the box.
;
; asyncio_mode = auto lets us write plain `async def test_...` functions
; without needing an @pytest.mark.asyncio decorator on every single one —
; pytest-asyncio detects and runs them automatically.
asyncio_mode = auto

markers =
    integration: requires the full stack running (docker-compose up) — talks to real Postgres/Redis/API over HTTP. Skipped by default; run explicitly with `pytest -m integration`.
